# configuration file for the simulation.
# The ranges are specified in 2, MUTUALLY EXCLUSIVE ways:
#
# 1. Fixed Range
# A list specifying all the values. E.g.:
# fixed_range = []
#
# 2. Dynamic range
# strtval = scalar 
# endval = scalar
# n_entries = scalar

[n_subjects]
fixed_range = [10, 20]

[n_phase_bins]
fixed_range = [51]
# strtval = 41
# endval = 51
# n_entries = 11

[n_trials]
fixed_range = [100, 500]

[n_perms] # number of permutations to be executed for hypothesis testing
fixed_range = [1000]

[effect_mag]
strtval = 0.01
endval = 0.3
n_entries = 10 

[trl_noise] # noise at the single trial level
fixed_range = [0.001]

[intersubj_noise] # noise in phase coherence inter subjects
fixed_range = [0]

[range_bin]
fixed_range = [0.1] # pi multiplier, to avoid setting pi itself here




